services:
  - type: web
    name: hackathon-portal-backend
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_SIMPLE_SEARCH
        value: "true"
      - key: ENABLE_FAISS_WARMUP
        value: "false"
      - key: USE_SIMPLE_SEARCH
        value: "true"
